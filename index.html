<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bíblia Sagrada</title>
    <link rel="icon" type="image/jpeg" href="logo150.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { background-color: #f7f3e9; color: #2c2c2c; font-family: 'Georgia', serif; margin: 0; padding: 0; }
        
        /* Header Compacto com Logo */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 5px 15px; background: #fff; border-bottom: 1px solid #e0d9c1;
            position: sticky; top: 0; z-index: 100; height: 50px;
        }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-img { height: 35px; width: 35px; border-radius: 5px; object-fit: cover; }
        header h1 { font-size: 1rem; margin: 0; color: #5d4037; font-family: 'Inter', sans-serif; font-weight: 700; }

        .container { max-width: 700px; margin: 0 auto; padding: 15px; padding-bottom: 110px; }
        .lista-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
        .btn-livro { 
            background: #fff; border: 1px solid #d3cebd; padding: 12px 5px; 
            border-radius: 8px; font-size: 16px; font-weight: bold; color: #5d4037;
            box-shadow: 0 2px 0 #d3cebd;
        }

        .leitura { display: none; font-size: 22px; line-height: 1.8; text-align: justify; }
        .num-v { font-size: 0.6em; font-weight: bold; color: #a1887f; margin-right: 4px; vertical-align: super; }
        .btn-acao { background: #5d4037; color: #fff; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-bottom: 15px; }

        /* Rodapé de anúncios aprimorado */
        #content-area {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #fff; border-top: 2px solid #5147e6;
            z-index: 1000; height: 90px; transition: all 0.3s;
        }
        #content-area.collapsed { height: 30px; }
        .content-wrapper { display: flex; align-items: center; gap: 12px; padding: 10px; text-decoration: none; }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <img src="logo150.jpg" alt="Logo" class="logo-img">
        <h1>Bíblia Sagrada</h1>
    </div>
    <span class="text-[10px] uppercase text-amber-800 font-bold">Palavra que Fortifica</span>
</header>

<div class="container">
    <div id="menu">
        <div class="lista-grid" id="listaLivros"></div>
    </div>

    <div id="telaLeitura" class="leitura">
        <button class="btn-acao" onclick="irParaMenu()">⬅ Livros</button>
        <h2 id="nomeLivro" class="text-center font-bold text-amber-900 mb-4"></h2>
        <div id="texto"></div>
    </div>
</div>

<div id="content-area">
    <button id="collapse-button" class="absolute -top-3 right-4 bg-amber-600 text-white rounded-full w-6 h-6 flex items-center justify-center text-[10px] shadow-md">▼</button>
    <div id="loading-ads" class="text-center py-2 text-xs text-gray-400">Buscando mensagens...</div>
    <a id="content-link" href="#" target="_blank" class="content-wrapper hidden">
        <img id="content-image" class="w-16 h-16 rounded-lg shadow-sm border" src="" alt="">
        <div class="flex-grow min-w-0">
            <h3 id="content-title" class="text-sm font-bold text-indigo-700 truncate"></h3>
            <p id="offer-description" class="text-xs text-gray-600 line-clamp-2"></p>
        </div>
    </a>
</div>

<script>
    let livros = [];
    let offersData = [];
    const OFFERS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQaiIM_7fbsAN3SJvgWmJhEeciFZtvCeUFEyJwyaldEDlbh5kxXgg5l6y31V7RpxGldW-Kpc7oWdHst/pub?gid=1157838368&single=true&output=csv";

    // Carregar Bíblia
    fetch('js/biblia.json')
        .then(res => res.json())
        .then(data => {
            livros = data;
            renderizarMenu();
        }).catch(e => console.error("Erro ao ler biblia.json. Verifique se o arquivo está na pasta js/"));

    function renderizarMenu() {
        const grade = document.getElementById('listaLivros');
        grade.innerHTML = '';
        livros.forEach((l, i) => {
            const b = document.createElement('button');
            b.className = 'btn-livro';
            b.innerText = l.name;
            b.onclick = () => abrirLivro(i);
            grade.appendChild(b);
        });
    }

    function abrirLivro(i) {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('telaLeitura').style.display = 'block';
        const livro = livros[i];
        document.getElementById('nomeLivro').innerText = livro.name;
        let html = '';
        livro.chapters[0].forEach((v, idx) => {
            html += `<span class="versiculo"><span class="num-v">${idx+1}</span>${v} </span>`;
        });
        document.getElementById('texto').innerHTML = html;
        window.scrollTo(0,0);
    }

    function irParaMenu() {
        document.getElementById('menu').style.display = 'block';
        document.getElementById('telaLeitura').style.display = 'none';
    }

    // Lógica de Publicidade Robusta (Trata vírgulas no CSV)
    async function fetchOffers() {
        try {
            const response = await fetch(OFFERS_CSV_URL);
            const csvText = await response.text();
            // Função simples para separar CSV respeitando aspas
            const rows = csvText.split('\n').slice(1);
            offersData = rows.map(row => {
                const cols = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                if (cols && cols.length >= 3) {
                    return {
                        title: cols[0].replace(/"/g, ''),
                        link: cols[1].replace(/"/g, ''),
                        img: cols[2].replace(/"/g, ''),
                        desc: cols[3] ? cols[3].replace(/"/g, '') : ""
                    };
                }
                return null;
            }).filter(o => o && o.img);
            
            if (offersData.length > 0) {
                rotateOffers();
                setInterval(rotateOffers, 10000);
            }
        } catch (e) { console.error("Erro ao carregar anúncios", e); }
    }

    function rotateOffers() {
        const ad = offersData[Math.floor(Math.random() * offersData.length)];
        const link = document.getElementById('content-link');
        document.getElementById('loading-ads').classList.add('hidden');
        link.classList.remove('hidden');
        document.getElementById('content-title').innerText = ad.title;
        document.getElementById('content-image').src = ad.img;
        link.href = ad.link;
        document.getElementById('offer-description').innerText = ad.desc;
    }

    document.getElementById('collapse-button').onclick = (e) => {
        const area = document.getElementById('content-area');
        area.classList.toggle('collapsed');
        e.target.innerText = area.classList.contains('collapsed') ? '▲' : '▼';
    };

    fetchOffers();
</script>

</body>
</html>
