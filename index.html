<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bíblia Sagrada</title>
    <link rel="icon" type="image/jpeg" href="logo150.jpg">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

<header>
    <div class="header-left" onclick="irParaMenu()" style="cursor:pointer">
        <img src="logo150.jpg" alt="Logo" class="logo-img">
        <div class="logo-text">
            <span class="title-biblia">BÍBLIA</span>
            <span class="subtitle-biblia">SAGRADA</span>
        </div>
    </div>

    <div class="header-nav">
        <button class="btn-testamento" onclick="filtrarTestamento('velho')">Velho Test.</button>
        <button class="btn-testamento" onclick="filtrarTestamento('novo')">Novo Test.</button>
    </div>
</header>

<main class="container">
    <section id="menu">
        <div class="lista-grid" id="listaLivros"></div>
    </section>

    <section id="telaLeitura" class="leitura">
        <h2 id="nomeLivro" class="text-center text-[#5d4037] text-3xl mb-6 font-serif"></h2>
        
        <div id="seletorCapitulos" class="lista-grid mb-6"></div>
        
        <article id="texto"></article>
    </section>
</main>

<aside id="content-area">
    <button id="collapse-button" class="absolute -top-3 right-4 bg-[#5147e6] text-white rounded-full w-7 h-7 flex items-center justify-center text-[12px] shadow-lg">▼</button>
    <div id="loading-ads" class="loading-state">Carregando ofertas incríveis...</div>
    <a id="content-link" href="#" target="_blank" class="content-wrapper hidden">
        <img id="content-image" class="content-image" src="" alt="">
        <div class="min-w-0">
            <h3 id="content-title"></h3>
            <p id="offer-description"></p>
        </div>
    </a>
</aside>

<script src="script.js"></script>
</body>
</html>
