<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bíblia Sagrada</title>
    <link rel="icon" type="image/jpeg" href="logo150.jpg">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="header-left" onclick="irParaMenu()" style="cursor:pointer">
        <img src="logo150.jpg" alt="Logo" class="logo-img">
        <div class="logo-text">
            <span class="title-biblia">BÍBLIA</span>
            <span class="subtitle-biblia">SAGRADA</span>
            <span class="tagline-biblia">Palavra que fortifica</span>
        </div>
    </div>

    <div class="header-nav">
        <button class="btn-testamento" onclick="filtrarTestamento('velho')">Velho<br>Testamento</button>
        <button class="btn-testamento" onclick="filtrarTestamento('novo')">Novo<br>Testamento</button>
    </div>
</header>

<main class="container">
    <section id="menu">
        <div class="lista-grid" id="listaLivros"></div>
    </section>

    <section id="telaLeitura" class="leitura">
        <div class="header-leitura">
            <h2 id="nomeLivro"></h2>
            <button onclick="compartilharWhatsApp()" class="btn-whatsapp">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
        <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/>
    </svg>
    Enviar
</button>
        </div>
        
        <div id="seletorCapitulos"></div>
        
        <article id="texto"></article>
    </section>
</main>

<aside id="content-area">
    <button id="collapse-button">▼</button>
    <div id="loading-ads" class="loading-state">Carregando ofertas...</div>
    <a id="content-link" href="#" target="_blank" class="content-wrapper hidden">
        <img id="content-image" class="content-image" src="" alt="">
        <div class="min-w-0">
            <h3 id="content-title"></h3>
            <p id="offer-description"></p>
        </div>
    </a>
</aside>

<script src="script.js"></script>
</body>
</html>
