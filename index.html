<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bíblia Sagrada</title>
    <link rel="icon" type="image/jpeg" href="logo150.jpg">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

<header>
    <div class="logo-area">
        <img src="logo150.jpg" alt="Logo" class="logo-img">
        <h1>Bíblia Sagrada</h1>
    </div>
    <span class="text-[10px] uppercase text-amber-800 font-bold leading-tight text-right">
        Palavra que<br>Fortifica
    </span>
</header>

<main class="container">
    <section id="menu">
        <div class="lista-grid" id="listaLivros"></div>
    </section>

    <section id="telaLeitura" class="leitura">
        <button class="btn-acao" onclick="irParaMenu()">📖 Índice</button>
        <h2 id="nomeLivro" class="text-center text-[#5d4037] text-3xl mb-6 font-serif"></h2>
        
        <div id="seletorCapitulos" class="flex flex-wrap gap-2 mb-6 justify-center"></div>
        
        <article id="texto"></article>
    </section>
</main>

<aside id="content-area">
    <button id="collapse-button" class="absolute -top-3 right-4 bg-[#5147e6] text-white rounded-full w-7 h-7 flex items-center justify-center text-[12px] shadow-lg">▼</button>
    <div id="loading-ads" class="loading-state">Buscando mensagens...</div>
    <a id="content-link" href="#" target="_blank" class="content-wrapper hidden">
        <img id="content-image" class="content-image" src="" alt="">
        <div class="min-w-0">
            <h3 id="content-title"></h3>
            <p id="offer-description"></p>
        </div>
    </a>
</aside>

<script src="script.js"></script>
</body>
</html>
