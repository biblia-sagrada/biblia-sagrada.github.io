<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bíblia Sagrada - Palavra que Fortifica</title>
    <style>
        body { background-color: #fcf9f2; color: #333; font-family: 'Georgia', serif; margin: 0; padding: 0; line-height: 1.6; }
        header { padding: 20px; text-align: center; background-color: #fff; border-bottom: 2px solid #e8e2d0; }
        h1 { margin: 0; font-size: 28px; color: #5d4037; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; text-align: center; }
        
        /* Botões grandes para o índice */
        .btn-livro { 
            display: block; background-color: #5d4037; color: white; 
            padding: 20px; margin: 10px 0; border-radius: 12px; 
            text-decoration: none; font-size: 22px; font-weight: bold; 
            cursor: pointer; border: none; width: 100%;
        }

        /* Estilo do Texto da Bíblia */
        .leitura { text-align: left; font-size: 24px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: none; }
        .versiculo { margin-bottom: 15px; display: block; }
        .numero-v { font-size: 14px; color: #999; margin-right: 10px; vertical-align: top; }

        .btn-voltar { background: #8d6e63; color: white; padding: 10px 20px; border: none; border-radius: 5px; margin-bottom: 20px; cursor: pointer; display: none; }
        
        .propaganda { background-color: #f0f0f0; padding: 15px; text-align: center; border-top: 1px solid #ddd; position: sticky; bottom: 0; width: 100%; }
    </style>
</head>
<body>

<header>
    <h1>Bíblia Sagrada</h1>
    <p>Palavra que Fortifica</p>
</header>

<div class="container">
    <button id="btnVoltar" class="btn-voltar" onclick="voltar()">⬅ Voltar aos Livros</button>
    
    <div id="indice">
        <p style="font-size: 20px;">Toque no livro para ler:</p>
        <div id="listaLivros"></div>
    </div>

    <div id="leitura" class="leitura">
        <h2 id="tituloLivro"></h2>
        <div id="textoBiblico"></div>
    </div>
</div>

<div class="propaganda">
    <small>Publicidade</small>
    <div style="height: 50px; background: #e8e8e8; display: flex; align-items: center; justify-content: center; color: #777;">
        Seu Anúncio Aqui
    </div>
</div>

<script>
    let dadosBiblia = [];

    // Busca o arquivo JSON que você criou
    fetch('biblia.json')
        .then(response => response.json())
        .then(data => {
            dadosBiblia = data;
            exibirIndice();
        });

    function exibirIndice() {
        const lista = document.getElementById('listaLivros');
        lista.innerHTML = '';
        dadosBiblia.forEach((livro, index) => {
            const btn = document.createElement('button');
            btn.className = 'btn-livro';
            btn.innerText = livro.name;
            btn.onclick = () => lerLivro(index);
            lista.appendChild(btn);
        });
    }

    function lerLivro(index) {
        document.getElementById('indice').style.display = 'none';
        document.getElementById('leitura').style.display = 'block';
        document.getElementById('btnVoltar').style.display = 'inline-block';
        
        const livro = dadosBiblia[index];
        document.getElementById('tituloLivro').innerText = livro.name;
        
        let conteudoHtml = '';
        // Pegamos o primeiro capítulo da nossa amostra
        livro.chapters[0].forEach((versiculo, i) => {
            conteudoHtml += `<span class="versiculo"><span class="numero-v">${i + 1}</span>${versiculo}</span>`;
        });
        
        document.getElementById('textoBiblico').innerHTML = conteudoHtml;
        window.scrollTo(0,0);
    }

    function voltar() {
        document.getElementById('indice').style.display = 'block';
        document.getElementById('leitura').style.display = 'none';
        document.getElementById('btnVoltar').style.display = 'none';
    }
</script>

</body>
</html>
