<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bíblia Sagrada</title>
    <link rel="icon" type="image/jpeg" href="logo150.jpg">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="header-left" onclick="irParaMenu()" style="cursor:pointer">
        <img src="logo150.jpg" alt="Logo" class="logo-img">
        <div class="logo-text">
            <span class="title-biblia">BÍBLIA</span>
            <span class="subtitle-biblia">SAGRADA</span>
        </div>
    </div>

    <div class="header-nav">
        <button class="btn-testamento" onclick="filtrarTestamento('velho')">Velho<br>Testamento</button>
        <button class="btn-testamento" onclick="filtrarTestamento('novo')">Novo<br>Testamento</button>
    </div>
</header>

<main class="container">
    <section id="menu">
        <div class="lista-grid" id="listaLivros"></div>
    </section>

    <section id="telaLeitura" class="leitura">
        <div class="header-leitura">
            <h2 id="nomeLivro"></h2>
            <button onclick="compartilharWhatsApp()" class="btn-whatsapp">
                <svg viewBox="0 0 448 512" width="14" height="14" fill="currentColor"><path d="M380.9 97.1C339 55.1 283.2 32 223.9 32c-122.4 0-222 99.6-222 222 0 39.1 10.2 77.3 29.6 111L0 480l117.7-30.9c32.4 17.7 68.9 27 106.1 27h.1c122.3 0 224.1-99.6 224.1-222 0-59.3-25.2-115-67.1-117zm-157 338.7h-.1c-34 0-67.3-9.1-96.4-26.2l-6.9-4.1-71.9 18.9 19.3-70.1-4.5-7.2c-18.7-29.7-28.6-64.1-28.6-99.7 0-106.2 86.4-192.6 192.7-192.6 51.5 0 99.8 20.1 136.1 56.4 36.3 36.3 56.4 84.7 56.4 136.2 0 106.3-88 192.6-192.7 192.6zM347.7 300.5c-6.8-3.4-40-19.7-46.2-22-6.2-2.3-10.8-3.4-15.3 3.4-4.5 6.8-17.5 22-21.5 26.5-4 4.5-8 5.1-14.8 1.7-6.8-3.4-28.7-10.6-54.7-33.8-20.2-18.1-33.9-40.4-37.8-47.2-4-6.8-.4-10.4 3-13.8 3.1-3 6.8-8 10.2-12 3.4-4 4.5-6.8 6.8-11.3 2.3-4.5 1.1-8.5-.6-12-1.7-3.4-15.3-37-21-50.7-5.5-13.3-11.1-11.5-15.3-11.7H174c-4.5 0-11.8 1.7-18.1 8.5-6.2 6.8-23.8 23.3-23.8 56.7 0 33.5 24.4 65.8 27.8 70.3 3.4 4.5 47.9 73.1 116.2 102.6 16.3 7 28.9 11.2 38.8 14.3 16.3 5.2 31.2 4.4 42.9 2.7 13.1-2 40-16.4 45.7-32.2 5.6-15.8 5.6-29.4 4-32.2-1.8-2.9-6.3-4.6-13.1-8.1z"/></svg>
                Enviar
            </button>
        </div>
        
        <div id="seletorCapitulos"></div>
        
        <article id="texto"></article>
    </section>
</main>

<aside id="content-area">
    <button id="collapse-button">▼</button>
    <div id="loading-ads" class="loading-state">Carregando ofertas...</div>
    <a id="content-link" href="#" target="_blank" class="content-wrapper hidden">
        <img id="content-image" class="content-image" src="" alt="">
        <div class="min-w-0">
            <h3 id="content-title"></h3>
            <p id="offer-description"></p>
        </div>
    </a>
</aside>

<script src="script.js"></script>
</body>
</html>
