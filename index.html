<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bíblia Sagrada - Palavra que Fortifica</title>
    
    <link rel="icon" type="image/jpeg" href="logo150.jpg">
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

<header>
    <div class="logo-area">
        <img src="logo150.jpg" alt="Logo" class="logo-img">
        <h1>Bíblia Sagrada</h1>
    </div>
    <span class="text-[10px] uppercase text-amber-800 font-bold tracking-tight text-right leading-none">
        Palavra que<br>Fortifica
    </span>
</header>

<main class="container">
    <section id="menu">
        <p class="text-center font-bold mb-4 text-[#8d6e63]">Selecione um livro:</p>
        <div class="lista-grid" id="listaLivros"></div>
    </section>

    <section id="telaLeitura" class="leitura">
        <button class="btn-acao" onclick="irParaMenu()">⬅ Voltar aos Livros</button>
        <h2 id="nomeLivro" class="text-center text-[#5d4037] text-3xl mb-5 border-b-2 border-[#e0d9c1] pb-2"></h2>
        <article id="texto"></article>
    </section>
</main>

<aside id="content-area">
    <button id="collapse-button" class="absolute -top-3 right-4 bg-[#5147e6] text-white rounded-full w-7 h-7 flex items-center justify-center text-[12px] shadow-lg z-50">
        ▼
    </button>
    
    <div id="loading-ads" class="loading-state">
        Carregando ofertas inspiradoras...
    </div>
    
    <a id="content-link" href="#" target="_blank" class="content-wrapper hidden">
        <img id="content-image" class="content-image" src="" alt="Produto">
        <div class="flex-grow min-w-0">
            <h3 id="content-title" class="text-sm font-bold text-indigo-700 truncate mb-1"></h3>
            <p id="offer-description" class="text-xs text-gray-600 line-clamp-2 leading-snug"></p>
        </div>
    </a>
</aside>

<script src="script.js"></script>

</body>
</html>
